<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory Weaver - Family Invite</title>
  <style>
    * { box-sizing:border-box; }
    body { font-family:"Trebuchet MS","Gill Sans",sans-serif; margin:0; min-height:100svh; display:grid; place-items:center; padding:22px; background:radial-gradient(circle at top left,rgba(140,94,60,.16),transparent 32%),#f5eee4; color:#1f1a17; }
    .card { width:min(680px,100%); background:rgba(255,252,247,.96); border:1px solid #e7d8c4; border-radius:28px; padding:clamp(28px,6vw,56px); box-shadow:0 24px 70px rgba(65,42,27,.12); }
    .brand { color:#8c5e3c; font-size:12px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; }
    h1 { font-family:Georgia,"Times New Roman",serif; font-size:clamp(38px,7vw,60px); line-height:1; letter-spacing:-.04em; margin:28px 0 18px; }
    a { display:inline-block; border-radius:16px; padding:13px 18px; background:#2f4d3b; color:#fff; font-weight:800; text-decoration:none; }
    p { color:#6d625b; line-height:1.7; margin:0 0 24px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">Memory Weaver</div>
    <h1>A place in your family archive is waiting.</h1>
    <p id="inviteStatus">A relative has invited you to share stories and build a family timeline together.</p>
    <a id="continueLink" href="{{DESTINATION}}">Accept family invitation</a>
  </main>
  <script nonce="{{CSP_NONCE}}">
    const token = decodeURIComponent(window.location.hash.slice(1));
    if (/^[A-Za-z0-9_-]{20,255}$/.test(token)) {
      sessionStorage.setItem('mw_family_invite', token);
      history.replaceState(null, '', '/invite');
    } else {
      document.getElementById('inviteStatus').textContent = 'This invitation is no longer available. Ask your relative to send a new one.';
      document.getElementById('continueLink').textContent = 'Open Memory Weaver';
    }
  </script>
</body>
</html>
