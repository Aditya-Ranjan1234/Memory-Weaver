name: Security and tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: sqlite:///./ci.db
      MW_DEV_AUTH: "1"
      MW_SESSION_SECRET: ci-only-session-secret-that-is-longer-than-forty-eight-characters # pragma: allowlist secret
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Scan tracked files for secrets
        run: git ls-files -z -- . ':(exclude).secrets.baseline' | xargs -0 detect-secrets-hook --baseline .secrets.baseline
      - name: Compile application
        run: python -m compileall -q app.py memory_weaver migrations tests
      - name: Lint and format check
        run: ruff check app.py memory_weaver migrations tests && ruff format --check app.py memory_weaver migrations tests
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Verify migrations
        run: python -m alembic upgrade head && python -m alembic check

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements.txt
